# Docker Build and Push to AWS ECR Workflow
# Automatically builds a Docker image and pushes it to AWS ECR on every push to main
# Uses AWS OIDC for secure, keyless authentication (no hardcoded AWS credentials)

name: Docker Build and Push

# Trigger on push to main branch only (avoids building on every PR)
on:
  push:
    branches:
      - master

# Required permissions for GitHub OIDC token and reading repository contents
permissions:
  id-token: write  # Required for AWS OIDC authentication
  contents: read   # Required to checkout repository code

jobs:
  build-and-push:
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for advanced Docker build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Configure AWS credentials using OpenID Connect (OIDC)
      # This is secure and does not require storing AWS access keys
      # Make sure you have:
      # - AWS_ROLE_ARN variable set to your IAM role ARN
      # - AWS_REGION variable set to your AWS region (e.g., us-east-1)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to AWS ECR (Elastic Container Registry)
      # This step authenticates and outputs the ECR registry URI
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image and push to ECR
      # Image is tagged with the full Git commit SHA (e.g., abc123def456...)
      # This ensures each build is uniquely identifiable and traceable to a commit
      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # IMAGE_TAG uses Git commit SHA for traceability
          # Example: 5e9f0c8a3f2b1d6c9e4a7f0b1c3d6e9f0c8a3f2b
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          echo "Building and pushing image: $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG"
          docker build \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest

      # Optional: Output summary info
      - name: Output image details
        run: |
          echo "Image successfully pushed to ECR"
          echo "Repository: ${{ secrets.ECR_REPOSITORY }}"
          echo "Tag: ${GITHUB_SHA}"

