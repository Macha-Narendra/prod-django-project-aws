name: Docker Build Push and GitOps Update

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      #################################################
      # Checkout Application Repository
      #################################################
      - name: Checkout code
        uses: actions/checkout@v4

      #################################################
      # Docker Buildx
      #################################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #################################################
      # AWS Authentication using OIDC
      #################################################
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      #################################################
      # Login to ECR
      #################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Build and Push Docker Image
      #################################################
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          IMAGE_URI=$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker build \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest .

          docker push $IMAGE_URI
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest

      #################################################
      # Clone GitOps Repository
      #################################################
      - name: Clone GitOps Repository
        run: |
          git clone \
          https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ vars.GITOPS_REPO }}.git \
          ecommerce-gitops

      #################################################
      # Update Helm values.yaml
      #################################################
      - name: Update image tag
        run: |
          cd ecommerce-gitops

          yq -i '
            .image.repository = "'"${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}"'" |
            .image.tag = "'"${IMAGE_TAG}"'"
          ' apps/ecommerce/ecommerce/values.yaml

          echo "Updated values.yaml"

          cat apps/ecommerce/ecommerce/values.yaml

      #################################################
      # Commit and Push Changes
      #################################################
      - name: Commit and Push GitOps Changes
        run: |
          cd ecommerce-gitops

          git config user.name "Narendra"
          git config user.email "Narendra.Babu@github.com"

          git add .

          git diff --cached --quiet && echo "No changes detected" && exit 0

          git commit -m "Update image tag to ${IMAGE_TAG}"

          git push origin ${{ vars.GITOPS_BRANCH }}

      #################################################
      # Summary
      #################################################
      - name: Deployment Summary
        run: |
          echo "Docker image pushed successfully"
          echo "Image URI: $IMAGE_URI"
          echo "GitOps repository updated"