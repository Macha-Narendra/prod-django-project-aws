{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-layout">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="auth-card mx-auto">
                    <span class="auth-brand"><i class="bi bi-person-circle" aria-hidden="true"></i></span>
                    <h1>Login</h1>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form.non_field_errors }}
                        <div class="mb-3">
                            <label class="form-label" for="{{ form.username.id_for_label }}">{{ form.username.label }}</label>
                            {{ form.username }}
                            {{ form.username.errors }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="{{ form.password.id_for_label }}">{{ form.password.label }}</label>
                            {{ form.password }}
                            {{ form.password.errors }}
                        </div>
                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
                            Login
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'register' %}">Create an account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
