{% extends 'base.html' %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
<h1 class="title">{{ product.name }}</h1>
<div class="box">
    <p>{{ product.description }}</p>
    <p class="has-text-weight-semibold">Price: ${{ product.price }}</p>
    <p class="is-size-7 has-text-grey">Created by {{ product.created_by.username }} on {{ product.created_at|date:'M d, Y' }}</p>
</div>
{% endblock %}
