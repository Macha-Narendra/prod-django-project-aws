{% extends 'base.html' %}
{% block title %}Delete {{ product.name }}{% endblock %}
{% block content %}
<section class="page-shell">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="delete-panel">
                    <span class="delete-icon"><i class="bi bi-exclamation-triangle" aria-hidden="true"></i></span>
                    <p class="page-kicker">Catalog</p>
                    <h1 class="h2 fw-bold mb-3">Delete {{ product.name }}?</h1>
                    <p class="text-muted mb-4">This product will be permanently removed from your catalog.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex flex-column flex-sm-row gap-2">
                            <button class="btn btn-danger" type="submit">
                                <i class="bi bi-trash" aria-hidden="true"></i>
                                Delete Product
                            </button>
                            <a class="btn btn-outline-secondary" href="{% url 'product_detail' product.pk %}">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
